<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marqflow</title>
  <link rel="stylesheet" href="/static/gallery.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Marquetry planner</p>
        <h1>Image to measured veneer puzzle</h1>
      </div>
      <p id="status" class="status">Choose an image to start.</p>
    </header>

    <section class="card">
      <h2>1. Workspace and image</h2>
      <div class="controls">
        <label>Workspace <input id="workspace-name" type="text" placeholder="bennett-portrait" /></label>
        <button id="refresh-workspaces" type="button">Refresh workspaces</button>
        <label>Open <select id="workspace-list"></select></label>
        <button id="open-workspace" type="button">Open workspace</button>
        <button id="delete-workspace" type="button">Delete workspace</button>
      </div>
      <div class="controls">
        <input id="image-input" type="file" accept="image/*" />
        <label>Max working edge <input id="max-edge" type="number" value="768" min="64" max="2048" step="64" /></label>
        <label>Regions <input id="target-regions" type="number" value="80" min="2" /></label>
        <label>Compactness <input id="compactness" type="number" value="18" min="1" step="1" /></label>
        <button id="open-image" type="button">Open image</button>
      </div>
      <div class="controls">
        <label>Grid rows <input id="grid-rows" type="number" value="4" min="1" max="8" /></label>
        <label>Grid columns <input id="grid-cols" type="number" value="4" min="1" max="8" /></label>
        <label>Min regions <input id="min-regions" type="number" value="20" min="2" /></label>
        <label>Max regions <input id="max-regions" type="number" value="140" min="2" /></label>
        <label>Min compactness <input id="min-compactness" type="number" value="4" min="0.1" step="0.1" /></label>
        <label>Max compactness <input id="max-compactness" type="number" value="28" min="0.1" step="0.1" /></label>
        <label><input id="use-detail-zones" type="checkbox" /> Use focus zones</label>
        <label><input id="use-subject-mask" type="checkbox" checked /> Use subject mask</label>
        <button id="candidate-grid" type="button">Generate candidate grid</button>
      </div>
      <div id="candidates" class="candidates"></div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>2. Design invariant</h2>
        <div class="controls">
          <label>Width <input id="physical-width" type="number" value="8" min="0.1" step="0.1" /></label>
          <label>Height <input id="physical-height" type="number" value="10" min="0.1" step="0.1" /></label>
          <label>Unit <input id="physical-unit" type="text" value="in" /></label>
          <button id="update-size" type="button">Update size</button>
        </div>
        <pre id="summary">No workspace.</pre>
      </article>
      <article class="card">
        <h2>3. Veneer palette</h2>
        <div id="veneer-editor" class="veneer-editor"></div>
        <div class="controls">
          <button id="add-veneer" type="button">Add veneer</button>
          <button id="save-veneers" type="button">Save veneer palette</button>
        </div>
      </article>
    </section>

    <section class="card">
        <h2>4. Final design selection</h2>
        <div class="controls">
          <label>Selected veneer <select id="selected-veneer"></select></label>
          <button id="assign-selected" type="button">Assign selected</button>
          <button id="merge-selected" type="button">Merge selected</button>
          <label>Split parts <input id="split-parts" type="number" value="3" min="2" max="25" /></label>
          <label>Split compactness <input id="split-compactness" type="number" value="12" min="0.1" step="0.1" /></label>
          <button id="split-selected" type="button">Split selected</button>
          <button id="lock-selected" type="button">Lock selected</button>
          <button id="unlock-selected" type="button">Unlock selected</button>
          <button id="mark-subject" type="button">Mark subject</button>
          <button id="mark-background" type="button">Mark background</button>
          <label>Focus multiplier <input id="focus-multiplier" type="number" value="3" min="1" step="0.5" /></label>
          <button id="focus-selected" type="button">Make focus zone</button>
          <button id="apply-focus" type="button">Apply focus detail</button>
          <label>Min area <input id="repair-area" type="number" value="0.05" min="0.001" step="0.001" /></label>
          <button id="repair-small" type="button">Repair small pieces</button>
          <label>Smooth passes <input id="smooth-passes" type="number" value="1" min="1" max="20" /></label>
          <button id="smooth-boundaries" type="button">Smooth boundaries</button>
          <button id="apply-suggestions" type="button">Auto-merge small pieces</button>
          <button id="clear-selection" type="button">Clear selection</button>
          <button id="undo" type="button">Undo last edit</button>
        </div>
        <div class="controls">
          <label>Selection mode
            <select id="selection-mode">
              <option value="box">Box/click</option>
              <option value="lasso">Lasso</option>
              <option value="mask-subject">Brush subject</option>
              <option value="mask-background">Brush background</option>
            </select>
          </label>
          <label>Brush radius <input id="brush-radius" type="number" value="5" min="1" max="128" step="1" /></label>
          <button id="zoom-out" type="button">Zoom out</button>
          <label>Zoom <input id="canvas-zoom" type="range" min="25" max="400" step="25" value="100" /></label>
          <output id="zoom-label">100%</output>
          <button id="zoom-in" type="button">Zoom in</button>
          <button id="zoom-fit" type="button">Fit</button>
          <label><input id="show-mask" type="checkbox" checked /> Show mask</label>
        </div>
        <div class="viewer">
          <canvas id="design-canvas" width="1" height="1"></canvas>
        </div>
        <p id="selection-status" class="selection-status">No selected regions.</p>
        <div id="boundary-summary" class="boundary-summary"></div>
        <div id="merge-suggestions" class="suggestions"></div>
        <div id="regions" class="regions"></div>
    </section>

    <section class="card">
      <h2>5. Export</h2>
      <div class="controls">
        <label>SVG simplify <input id="svg-simplify" type="number" value="1" min="0" max="20" step="0.25" /></label>
        <button id="view-svg" type="button">Open SVG</button>
        <button id="view-coverage-svg" type="button">Open coverage-safe SVG</button>
        <button id="cleanup-report" type="button">Cleanup report</button>
        <button id="pack" type="button">Pack manifest</button>
      </div>
      <div id="pack-summary" class="pack-summary"></div>
      <pre id="pack-output"></pre>
    </section>
  </main>
  <script src="/static/gallery.js"></script>
</body>
</html>
