name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          uv sync --group dev
          npm ci

      - name: Build browser assets
        run: npm run build

      - name: Typecheck browser
        run: npm run typecheck

      - name: Lint Python
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q
